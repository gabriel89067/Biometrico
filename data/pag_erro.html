<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Tempo Esgotado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:#fff;
    }

    .container{
      background:#ffffff;
      color:#333;
      padding:40px;
      border-radius:12px;
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
      text-align:center;
      max-width:400px;
      width:90%;
    }

    h1{
      font-size:28px;
      margin-bottom:10px;
      color:#d9534f;
    }

    p{
      font-size:16px;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      padding:12px 20px;
      background:#2a5298;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      transition:0.3s;
      font-weight:bold;
    }

    .btn:hover{
      background:#1e3c72;
    }

    .icon{
      font-size:50px;
      margin-bottom:15px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="icon">⏳</div>
    <h1>Tempo Esgotado</h1>
    <p>Sua sessão expirou por inatividade.</p>
    <p>Por favor, faça login novamente para continuar.</p>
    <a href="/" class="btn">Voltar para Login</a>
  </div>

</body>
</html>
